start-at-login = true
after-startup-command = ['exec-and-forget /Users/rv/.config/aerospace/sort-apps.sh']
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

on-focused-monitor-changed = ['exec-and-forget aerospace list-monitors --focused --format %{monitor-id} > /tmp/.aerospace-focused-monitor', 'move-mouse monitor-lazy-center']
on-focus-changed = "move-mouse window-lazy-center"

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 16
outer.bottom = 8
outer.top = 8 
outer.right = 16

[key-mapping]
preset = 'qwerty'

[mode.main.binding]
alt-r = 'mode resize'
alt-enter = "exec-and-forget /Applications/Ghostty.app/Contents/MacOS/ghostty"
# alt-enter = "exec-and-forget /Applications/Alacritty.app/Contents/MacOS/alacritty"

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

alt-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
alt-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
alt-shift-3 = 'move-node-to-workspace --focus-follows-window 3'
alt-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
alt-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
alt-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
alt-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
alt-shift-8 = 'move-node-to-workspace --focus-follows-window 8'
alt-shift-9 = 'move-node-to-workspace --focus-follows-window 9'
alt-shift-0 = 'move-node-to-workspace --focus-follows-window 10'

alt-space = 'layout floating tiling'
alt-s = 'layout accordion vertical'        # stack
alt-w = 'layout accordion horizontal'      # tab

alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

alt-shift-semicolon = 'mode service'
alt-shift-c = 'reload-config'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
s = ['exec-and-forget /Users/rv/.config/aerospace/sort-apps.sh', 'mode main']
f = ['layout floating tiling', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']


[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
left = 'resize width -50'
down = 'resize height +50'
up = 'resize height -50'
right = 'resize width +50'
esc = 'mode main'
enter = 'mode main'

# float all windows
[[on-window-detected]]
check-further-callbacks = true
run = 'layout floating'

# select windows to tile
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['layout tiling', 'move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = ['layout tiling', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = ['layout tiling', 'move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'org.gnu.Emacs'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['layout tiling', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'org.chromium.Chromium'
run = ['layout tiling', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'
run = ['layout tiling', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = ['layout tiling', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = ['layout tiling', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.microsoft.edgemac'
run = ['layout tiling', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'move-node-to-workspace 9'

[[on-window-detected]]
if.app-id = 'com.cmuxterm.app'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'move-node-to-workspace 10'

[[on-window-detected]]
if.app-id = 'com.microsoft.teams'
run = 'move-node-to-workspace 10'

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = 'move-node-to-workspace 10'

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'move-node-to-workspace 10'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace 10'

[[on-window-detected]]
if.app-id = 'dev.vencord.vesktop'
run = 'move-node-to-workspace 10'


[workspace-to-monitor-force-assignment]
1 = 'Studio Display'
2 = 'Studio Display'
3 = 'Studio Display'
4 = 'Studio Display'
5 = 'Studio Display'
6 = 'Studio Display'

7 = 'Built-in Retina Display'
8 = 'Built-in Retina Display'
9 = 'Built-in Retina Display'
10 = 'Built-in Retina Display'

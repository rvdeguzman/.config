onboarding = false

[theme]
name = "gruvbox"

[keys]
prefix = "ctrl+a"

# Vim-style pane focus — direct chords, matches tmux C-h/j/k/l (no prefix)
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"

# Splits — tmux split-mode: v = left/right, h = top/bottom, x = delete pane
# (herdr has no w-> submode; these are direct, w stays the workspace picker)
split_vertical = "prefix+d"
split_horizontal = "prefix+shift+d"
close_pane = "prefix+x"

# Tabs ~ tmux windows
new_tab = "prefix+c"            # tmux: c new-window
next_tab = "prefix+n"
previous_tab = "prefix+p"
close_tab = "prefix+shift+x"    # tmux: X kill-window
rename_tab = "prefix+r"         # tmux: r -> w rename-window

# Workspaces ~ tmux sessions
new_workspace = "prefix+shift+c"   # tmux: C new-session
close_workspace = "prefix+shift+q" # tmux: q kill-session (confirm_close on)
rename_workspace = "prefix+shift+w" # tmux: r -> s rename-session

# Session / pane control
detach = "prefix+q"                # tmux: d detach-client
zoom = "prefix+z"                  # tmux: z zoom-pane
edit_scrollback = "prefix+y"       # closest to tmux: y copy-mode
resize_mode = "prefix+shift+r"     # moved off r (rename took it)
reload_config = "prefix+ctrl+r"
